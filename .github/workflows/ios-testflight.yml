# DuaHub — iOS Build & TestFlight Deploy (Expo / React Native)
#
# Gerekli repository secrets:
#   APP_STORE_CONNECT_ISSUER_ID   → App Store Connect API Issuer ID (mevcut ✓, upload adımı için)
#   APP_STORE_CONNECT_KEY_ID      → API Key ID (mevcut ✓, upload adımı için)
#   APP_STORE_P8_KEY              → .p8 dosyasının İÇERİĞİ (mevcut ✓, upload adımı için)
#   APPLE_TEAM_ID                 → 10 haneli Apple Team ID
#   BUILD_CERTIFICATE_BASE64      → Apple Distribution sertifikasının .p12'sinin base64'ü
#                                    (MAUI projesindeki ile AYNI takımdaysa aynı .p12'yi kullanabilirsin)
#   P12_PASSWORD                  → o .p12'nin şifresi
#   BUILD_PROVISION_PROFILE_BASE64 → com.ozclkonur.duahub için App Store dağıtım profilinin base64'ü (YENİ, bu app'e özel)
#   KEYCHAIN_PASSWORD              → CI'da geçici keychain için uydur bir şifre
#
# İmzalama: Önceki "cloud signing" (-allowProvisioningUpdates) denemesi CocoaPods
# hedefleri ile çakışıp "Implicit dependency on target 'Pods-duahub'" hatasında
# takılıyordu. MAUI projendeki .p12 + .mobileprovision + keychain yöntemine
# geçtik — bu yöntem senin hesabında zaten kanıtlanmış durumda.
#
# Tetikleme: macOS dakikaları 10x yandığı için her push'ta değil;
# Actions sekmesinden elle (workflow_dispatch) veya v* tag'i push'layınca çalışır.
#   git tag v1.0.0 && git push origin v1.0.0

name: iOS Build & TestFlight Deploy

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 90

    env:
      KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build content database (repoda yoksa)
        run: |
          if [ ! -f assets/db/quran.db ]; then
            npx tsx scripts/build-content-db.ts
          fi

      # CNG: ios/ klasörü repoda tutulmaz, her build'de üretilir.
      # prebuild, CocoaPods kurulumunu da (pod install) kendisi yapar.
      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          PROFILE_NAME=$(security cms -D -i $PP_PATH | plutil -extract Name xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: App Store Connect API key (yükleme adımı için)
        env:
          PRIVATE_KEY: ${{ secrets.APP_STORE_P8_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf "%s\n" "$PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$KEY_ID.p8
          cp ~/.appstoreconnect/private_keys/AuthKey_$KEY_ID.p8 "$RUNNER_TEMP/AuthKey.p8"

      # Her build benzersiz numara almalı; run_number bunu bedavaya sağlar.
      - name: Set build number
        working-directory: ios
        run: xcrun agvtool new-version -all ${{ github.run_number }}

      - name: Archive (manual signing)
        run: |
          xcodebuild archive \
            -workspace ios/duahub.xcworkspace \
            -scheme duahub \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/duahub.xcarchive" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ozclkonur.duahub</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/duahub.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -n 1)
          echo "Yükleniyor: $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"
